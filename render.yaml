services:
  - type: web
    name: chartwise-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && chmod +x render_start.sh && ./render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: chartwise-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://chartwise-ai-dal6.vercel.app
      - key: ENABLE_SCHEDULER
        value: true
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: chartwise-db
    plan: free
