# Render.com deployment configuration for Chartwise AI Backend
# This file defines the services and their configurations for deployment on Render.com

services:
  # Web Service - FastAPI Backend
  - type: web
    name: chartwise-ai-backend
    runtime: python
    plan: starter  # Use 'starter' for free tier, upgrade as needed
    buildCommand: pip install -r requirements.txt
    startCommand: chmod +x render_start.sh && ./render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: chartwise-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Auto-generate a secure secret key
      - key: FRONTEND_URL
        value: https://chartwise-ai.vercel.app  # Update with your actual Vercel domain
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000
      - key: ENABLE_SCHEDULER
        value: true
      - key: UPDATE_INTERVAL_MINUTES
        value: 15
      - key: DEBUG
        value: false
    healthCheckPath: /health
    autoDeploy: true  # Automatically deploy on git push

  # Redis Service (optional - for caching and Celery)
  - type: redis
    name: chartwise-redis
    plan: free  # Use free tier for Redis
    ipAllowList:  # Allow all Render services to connect
      - source: 0.0.0.0/0
        description: everywhere

databases:
  # PostgreSQL Database
  - name: chartwise-db
    plan: free  # Use free tier for PostgreSQL
    databaseName: chartwise
    user: chartwise

# Environment groups (optional - for sharing env vars across services)
envVarGroups:
  - name: chartwise-common
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
